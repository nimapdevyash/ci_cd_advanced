services:
  app:
    depends_on:
      db:
        condition: service_healthy

    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://postgres:pass@db:5432/ci_cd"
    ports:
      - "8000:8000"
    networks:
      - app-network
    volumes:
      - .:/app
      - /app/node_modules
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ci_cd
    networks:
      - app-network
    ports:
      - "5432:5432"
    volumes:
      - app-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ci_cd"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  app-data:
    driver: local
