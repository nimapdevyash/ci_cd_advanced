services:
  migration:
    image: nimapdevyash/prisma-app:latest
    restart: "no"
    expose:
      - "8000"
    environment:
      # Production cloud database connection string
      DATABASE_URL: "${DATABASE_URL:? Production Database Url is Required}"
    command: "pnpm dlx prisma migrate deploy" # after deploying the latest migration this will close as main process ends

  app:
    depends_on:
      migration:
        condition: service_completed_successfully
    image: nimapdevyash/prisma-app:latest
    restart: always
    expose:
      - "8000"
    environment:
      # Production cloud database connection string
      DATABASE_URL: "${DATABASE_URL:? Production Database Url is Required}"

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80" # Public HTTP Entry
      - "443:443" # Public HTTPS Entry (Caddy handles SSL certificates automatically)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:
