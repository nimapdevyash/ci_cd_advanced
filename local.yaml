services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000" # Exposed directly to localhost for easy testing
    volumes:
      - .:/app
      - /app/node_modules # Shield override for your laptop's node_modules
    environment:
      DATABASE_URL: "postgres://postgres:pass@db:5432/ci_cd"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ci_cd
    networks:
      - app-network
    ports:
      - "5432:5432"
    volumes:
      - app-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ci_cd"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  app-data:
    driver: local
